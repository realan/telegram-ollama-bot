    - При необходимости обновить статусы `design-1`, `design-2`, `design-3`, `design-4`.
    - При появлении ADR добавить ссылку или примечание в roadmap.
  context_dump:
    - Обновить `Last updated after`.
    - Обновить `Implemented Phases`.
    - Добавить краткое описание принятого context contract и memory design.
